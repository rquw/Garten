<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garten</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f0f; color: #ccc; font-family: monospace; padding: 20px; }
  header { display: flex; gap: 16px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  h1 { color: #fff; font-size: 1rem; }
  select { background: #1a1a1a; color: #ccc; border: 1px solid #333; padding: 4px 8px; font-family: monospace; }
  #count { color: #555; font-size: 0.85rem; margin-left: auto; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .card { background: #1a1a1a; border: 1px solid #222; overflow: hidden; }
  .card img { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; }
  .card .info { padding: 8px 10px; font-size: 0.75rem; color: #666; display: flex; flex-direction: column; gap: 3px; }
  .card .info .label { color: #aaa; }
  .card .info .id { color: #444; }
</style>
</head>
<body>
<header>
  <h1>Garten</h1>
  <select id="sort">
    <option value="date-desc">Date ↓</option>
    <option value="date-asc">Date ↑</option>
    <option value="size-desc">Size ↓</option>
    <option value="size-asc">Size ↑</option>
  </select>
  <span id="count"></span>
</header>
<div id="grid"></div>
<script>
  let photos = [];

  function render() {
    const sort = document.getElementById('sort').value;
    let sorted = [...photos];
    if (sort === 'date-desc') sorted.sort((a, b) => new Date(b.time) - new Date(a.time));
    if (sort === 'date-asc') sorted.sort((a, b) => new Date(a.time) - new Date(b.time));
    if (sort === 'size-desc') sorted.sort((a, b) => (b.size || 0) - (a.size || 0));
    if (sort === 'size-asc') sorted.sort((a, b) => (a.size || 0) - (b.size || 0));

    document.getElementById('count').textContent = `${sorted.length} photos`;
    document.getElementById('grid').innerHTML = sorted.map((p, i) => `
      <div class="card">
        <img src="${p.url}" loading="lazy">
        <div class="info">
          <span class="label">${p.label || 'unknown'}</span>
          <span>${new Date(p.time).toLocaleString()}</span>
          <span class="id">#${sorted.length - i} · ${p.file}</span>
        </div>
      </div>
    `).join('');
  }

  async function load() {
    const r = await fetch('photos.json?t=' + Date.now());
    photos = await r.json();
    render();
  }

  document.getElementById('sort').addEventListener('change', render);
  load();
  setInterval(load, 30000);
</script>
</body>
</html>
